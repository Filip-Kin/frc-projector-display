<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Queuing Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  body {
    --stream-pct: 70;
    display: grid;
    grid-template-columns: calc((100 - var(--stream-pct)) * 1%) calc(var(--stream-pct) * 1%);
    grid-template-rows:    calc(var(--stream-pct) * 1%) calc((100 - var(--stream-pct)) * 1%);
    grid-template-areas: "sidebar stream" "sidebar bottom";
  }
  body.size-60 { --stream-pct: 60; }

  /* ── Generic widget container ── */
  .widget { padding: 18px 20px; overflow: hidden; background: #0d0d0d;
    display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  #sidebar { grid-area: sidebar; }
  #bottom  { grid-area: bottom; border-top: 2px solid #1a1a1a; }
  .col-title { font-size: 0.85rem; letter-spacing: 0.18em; color: #4af; font-weight: 700;
    text-transform: uppercase; padding-bottom: 8px; border-bottom: 2px solid #1a3a55;
    flex-shrink: 0; }

  /* ── Stream area ── */
  #stream { grid-area: stream; background: #000; position: relative; overflow: hidden; }
  #stream iframe { width: 100%; height: 100%; border: 0; display: block; }
  #stream .ndi-placeholder {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #333; font-size: 1.4rem; letter-spacing: 0.2em;
  }

  /* ── Match cards ── */
  /* Cards use flex:1 to share available vertical space evenly; their internal
     font sizes scale with the card height so we fit any screen without
     leaving empty space at the bottom. The hero (on-field) gets a bigger
     flex share so its emphasis doesn't depend on font tricks alone. */
  .matches-list { display: flex; flex-direction: column; gap: 8px;
    overflow: hidden; flex: 1; min-height: 0; }
  .match-card {
    background: #181818; border-radius: 10px; padding: 10px 14px;
    border-left: 4px solid #555;
    display: flex; flex-direction: column; gap: 4px;
    flex: 1 1 0; min-height: 0;
    overflow: hidden;
    font-size: clamp(0.85rem, 1.6vh, 1.5rem);
  }
  .match-card .header {
    display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
    flex-shrink: 0;
  }
  /* Body wraps everything below the header so we can vertically-center the
     alliances when the card has spare height (notably the on-field hero) */
  .match-card .match-body {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column; justify-content: center; gap: 4px;
  }
  .match-card .label  { font-size: 1.6em; font-weight: 800; color: #fff; line-height: 1; }
  .match-card .status { font-size: 0.7em; color: #888;
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; white-space: nowrap; }
  .match-card .alliance { display: flex; align-items: center; gap: 8px; }
  .match-card .alliance-tag { width: 3em; flex-shrink: 0; font-size: 0.7em; font-weight: 800;
    letter-spacing: 0.08em; padding: 3px 0; text-align: center; border-radius: 3px; }
  .match-card .red-tag  { background: #6b1717; color: #fcc; }
  .match-card .blue-tag { background: #19306b; color: #cdf; }
  .match-card .teams { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }
  .match-card .team {
    width: 4.2em;             /* fixed: fits 5 digits at any zoom */
    padding: 3px 0;
    border-radius: 4px;
    text-align: center;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    font-size: 1.4em;
    line-height: 1.15;
  }
  .match-card .red  .team { background: #3a0d0d; color: #f88; }
  .match-card .blue .team { background: #0d1f3a; color: #8af; }
  .match-card .when { font-size: 0.72em; color: #777; padding-top: 2px; }

  /* On Field — hero: bigger flex share + accents */
  .match-card.on-field {
    flex-grow: 1.6;
    border: 2px solid #fa0; background: #1a1408;
    box-shadow: 0 0 24px #fa04; border-left-color: #fa0;
  }
  .match-card.on-field .label  { font-size: 2.2em; color: #fc4; }
  .match-card.on-field .status { color: #fa0; font-size: 0.85em; }
  .match-card.on-field .team   { font-size: 1.7em; }
  .match-card.on-field .alliance-tag { font-size: 0.85em; }

  /* On Deck */
  .match-card.on-deck     { border-left-color: #4af; }
  .match-card.on-deck     .status { color: #4af; }

  /* Now Queuing */
  .match-card.now-queuing { border-left-color: #6f6; }
  .match-card.now-queuing .status { color: #6f6; }

  /* ── Updates widget (announcements + parts combined) ── */
  .updates-list { display: flex; flex-direction: column; gap: 8px;
    overflow: hidden; flex: 1; min-height: 0; }
  .update-item {
    background: #181818; padding: 10px 14px; border-radius: 6px; border-left: 4px solid #4af;
    flex-shrink: 0;
  }
  .update-item.parts { border-left-color: #fa0; }
  .update-item .src {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700;
    color: #4af; margin-bottom: 3px;
  }
  .update-item.parts .src { color: #fa0; }
  .update-item .body { font-size: 1rem; line-height: 1.35; color: #ddd; }
  .update-item .when { font-size: 0.7rem; color: #555; margin-top: 3px; }
  .update-item.parts .team { color: #fa0; font-weight: 700; }

  /* ── Rankings widget ── */
  /* CSS multicolumn for both sidebar (1 column tall) and bottom (multi-column,
     auto-flow column-first so reading goes top→bottom then left→right). */
  .rankings-list { overflow: hidden; flex: 1; min-height: 0;
    transition: opacity 400ms ease; }
  .rankings-list.fade { opacity: 0; }
  .rankings-list.sidebar { display: flex; flex-direction: column; gap: 0; }
  /* Bottom layout uses CSS Grid so we get deterministic column count + dense
     column-first flow. Pages are sized per render to a multiple of the
     column count, avoiding the ragged short-last-column look. */
  .rankings-list.bottom {
    display: grid;
    grid-auto-flow: column;
    column-gap: 14px;
    row-gap: 4px;
    align-content: start;
  }
  .rank-row {
    display: flex; align-items: baseline; gap: 8px; padding: 4px 8px;
    border-radius: 4px;
    /* Each row spans its grid track / flex line; without width:100% the
       auto-margin RP only reaches the row's intrinsic content edge. */
    width: 100%;
    box-sizing: border-box;
  }
  .rank-row .rank { width: 1.8em; color: #888; font-variant-numeric: tabular-nums;
    font-weight: 700; text-align: right; flex-shrink: 0; }
  .rank-row .rank.top3 { color: #fa0; }
  .rank-row .team { color: #fff; font-weight: 800; font-variant-numeric: tabular-nums; }
  .rank-row .rp { margin-left: auto; min-width: 3.4em; text-align: right;
    color: #6cf; font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; }
  /* Sidebar: every row tall enough that 22 rows fill the column. Fonts scale
     up so a single team number is the dominant visual element. */
  .rankings-list.sidebar .rank-row {
    font-size: clamp(1.1rem, calc((var(--stream-pct) * 1vh) / 24), 2.2rem);
    padding: 2px 8px;
  }
  .rankings-list.sidebar .rank-row .team { font-size: 1.05em; }
  .rankings-list.sidebar .rank-row .rp   { font-size: 0.7em; min-width: 4em; color: #4af; }
  .rankings-list.sidebar .rank-row:nth-child(even) { background: #141414; }
  /* Bottom: smaller font + multicolumn fits ~5 columns x 6 rows for ~30 teams */
  .rankings-list.bottom .rank-row {
    background: #141414; margin-bottom: 3px;
    font-size: clamp(0.9rem, 1.6vh, 1.3rem);
    padding: 4px 10px;
  }
  .rankings-list.bottom .rank-row .team { font-size: 1.1em; }
  .rankings-list.bottom .rank-row .rp   { font-size: 0.78em; }
  .rankings-page-indicator { font-size: 0.7rem; color: #555; font-weight: 500;
    letter-spacing: 0.05em; margin-left: 8px; }

  /* ── Matches widget — bottom layout (row of 3 cards) ── */
  .matches-row { display: flex; flex-direction: row; gap: 10px; flex: 1; min-height: 0;
    overflow: hidden; align-items: stretch; }
  .matches-row .match-card {
    flex: 1 1 0;
    font-size: clamp(0.85rem, 1.4vh, 1.3rem);
    /* Pack content tight to the top of each card — the bottom slot is short,
       and centering left empty space above and below the alliances. */
    padding: 8px 12px; gap: 3px;
  }
  .matches-row .match-card .match-body { justify-content: flex-start; gap: 3px; }
  .matches-row .match-card.on-field {
    flex-grow: 1.4;
    box-shadow: none;
  }

  .schedule-delta { font-size: 0.95rem; font-weight: 700; padding: 8px 12px;
    border-radius: 6px; text-align: center; flex-shrink: 0; letter-spacing: 0.02em; }
  .schedule-delta.behind  { background: #2a0a0a; color: #faa; border: 1px solid #f664; }
  .schedule-delta.ahead   { background: #0a2a0a; color: #8f8; border: 1px solid #8f84; }
  .schedule-delta.on-time { background: #181818; color: #888; }

  .empty { color: #444; font-size: 0.9rem; font-style: italic; padding: 14px 0; }

  /* ── Status footer ── */
  #status { position: fixed; bottom: 6px; right: 12px; font-size: 1.1rem; color: #888;
    font-variant-numeric: tabular-nums; pointer-events: none;
    text-shadow: 0 1px 2px #000a; }
  #status.error { color: #f66; }
</style>
</head>
<body>

<section id="sidebar" class="widget"></section>
<section id="stream"></section>
<section id="bottom"  class="widget"></section>

<div id="status">…</div>

<script>
const params      = new URLSearchParams(location.search);
const eventKey    = (params.get('event') || '').trim();
const streamType  = (params.get('stream') || 'youtube').toLowerCase();
const streamId    = params.get('streamId') || '';
const sizePct     = parseInt(params.get('size') || '70', 10);
const sidebarKind = (params.get('sidebar') || 'matches').toLowerCase();
const bottomKind  = (params.get('bottom')  || 'updates').toLowerCase();

if (sizePct === 60) document.body.classList.add('size-60');

// ── Stream area ──────────────────────────────────────────────────────────────

const streamEl = document.getElementById('stream');
let currentEmbedSrc = '';

function buildYoutubeEmbed(spec) {
  // mute=1 + enablejsapi=1 + an unmute via the IFrame API once the player
  // is ready. mute=1 lets autoplay succeed; we flip mute off ~1.2s after
  // onReady fires. No start=99999 — out-of-bounds seek error 153 on VOD.
  const common = 'autoplay=1&mute=1&enablejsapi=1';
  if (spec.startsWith('channel:')) {
    return `https://www.youtube.com/embed/live_stream?channel=${encodeURIComponent(spec.slice(8))}&${common}`;
  }
  return `https://www.youtube.com/embed/${encodeURIComponent(spec)}?${common}&rel=0`;
}

let ytPlayer = null;
function setStreamEmbed(src) {
  if (src === currentEmbedSrc) return;
  currentEmbedSrc = src;
  streamEl.innerHTML = '';
  // Try to give the iframe an id even though we'll re-bind YT.Player; the
  // first call kicks off the API loader if it hasn't been already.
  const yt = document.createElement('iframe');
  yt.id = 'yt-' + Date.now();
  yt.src = src;
  yt.allow = 'autoplay;fullscreen';
  yt.allowFullscreen = true;
  streamEl.appendChild(yt);
  // YT API loader is idempotent; once the script tag is in DOM, callbacks
  // will fire as new players are constructed.
  if (!document.getElementById('yt-api-script')) {
    const s = document.createElement('script');
    s.id = 'yt-api-script';
    s.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
  }
  // Defer player wiring until the API is loaded. onYouTubeIframeAPIReady
  // gets called once globally; subsequent embeds bind directly.
  const bind = () => {
    try {
      ytPlayer = new YT.Player(yt.id, {
        events: {
          onReady: (e) => {
            setTimeout(() => { try { e.target.unMute(); e.target.setVolume(100); } catch {} }, 1200);
          }
        }
      });
    } catch {}
  };
  if (window.YT && window.YT.Player) bind();
  else window.onYouTubeIframeAPIReady = bind;
}

async function resolveEventWebcast(eventKey) {
  // Returns the per-spec form ('channel:...' or bare videoId) or null.
  try {
    const r = await fetch(`/api/webcast-for/${encodeURIComponent(eventKey)}`, { cache: 'no-store' });
    if (!r.ok) return null;
    const w = await r.json();
    if (!w?.id) return null;
    return w.kind === 'channel' ? `channel:${w.id}` : w.id;
  } catch { return null; }
}

async function refreshStream() {
  if (streamType !== 'youtube' || !streamId) return;
  if (streamId.startsWith('event:')) {
    const spec = await resolveEventWebcast(streamId.slice(6));
    if (spec) setStreamEmbed(buildYoutubeEmbed(spec));
    else if (!currentEmbedSrc) streamEl.innerHTML = '<div class="ndi-placeholder">No webcast</div>';
  } else {
    setStreamEmbed(buildYoutubeEmbed(streamId));
  }
}

if (streamType === 'youtube' && streamId) {
  refreshStream();
  // Re-resolve every hour so day rollovers swap in the new day's webcast
  // automatically without having to reconfigure or reboot.
  setInterval(refreshStream, 60 * 60 * 1000);
} else if (streamType === 'ndi') {
  streamEl.innerHTML = '<div class="ndi-placeholder">NDI</div>';
} else {
  streamEl.innerHTML = '<div class="ndi-placeholder">No stream</div>';
}

// ── Helpers ──────────────────────────────────────────────────────────────────

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(ms) {
  if (!ms) return '';
  return new Date(ms).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}
function teamRow(tag, tagClass, teams, alliance) {
  const t = (teams || []).map(n => `<span class="team">${esc(n)}</span>`).join('');
  return `<div class="alliance ${alliance}">
    <span class="alliance-tag ${tagClass}">${tag}</span>
    <div class="teams">${t || '<span style="opacity:0.4">—</span>'}</div>
  </div>`;
}
function matchCardHtml(m, kind) {
  return `<div class="match-card ${kind}">
    <div class="header">
      <span class="label">${esc(m.label)}</span>
      <span class="status">${esc(m.status || '')}</span>
    </div>
    <div class="match-body">
      ${teamRow('RED',  'red-tag',  m.redTeams,  'red')}
      ${teamRow('BLUE', 'blue-tag', m.blueTeams, 'blue')}
      ${m.times?.estimatedStartTime ? `<div class="when">Start ~${fmtTime(m.times.estimatedStartTime)}</div>` : ''}
    </div>
  </div>`;
}

// ── Widgets ──────────────────────────────────────────────────────────────────
// Each widget gets called with (containerEl, data) where data is the latest
// /event/:key payload. Rankings widget calls /api/tba/rankings/:key on its own.

function statusKind(s) {
  s = (s || '').toLowerCase();
  if (s.includes('on field'))     return 'on-field';
  if (s.includes('on deck'))      return 'on-deck';
  if (s.includes('now queuing'))  return 'now-queuing';
  return '';
}

function widgetMatches(el, data, placement) {
  const all = (data?.matches || []).filter(m => m && m.label);

  // Nexus retains status='On field' on every completed match, so the FIRST
  // "On field" is usually Practice 1. Anchor on the LAST one — that's the
  // most-recently-on-field match and the user's "now playing".
  let startIdx = -1;
  for (let i = all.length - 1; i >= 0; i--) {
    if (/on field/i.test(all[i].status)) { startIdx = i; break; }
  }
  if (startIdx < 0 && data.nowQueuing) {
    startIdx = all.findIndex(m => m.label === data.nowQueuing);
  }
  if (startIdx < 0) startIdx = all.findIndex(m => m.status);
  if (startIdx < 0) startIdx = 0;

  const count = placement === 'bottom' ? 3 : 5;
  const slice = all.slice(startIdx, startIdx + count);

  // Schedule delta from the anchor match (positive ms = behind schedule)
  const anchor = all[startIdx];
  const sched = anchor?.times?.scheduledStartTime;
  const est   = anchor?.times?.estimatedStartTime;
  let deltaHtml = '';
  if (sched && est) {
    const dMs = est - sched;
    const min = Math.round(Math.abs(dMs) / 60000);
    if (min < 1) {
      deltaHtml = `<div class="schedule-delta on-time">On schedule</div>`;
    } else {
      const cls = dMs > 0 ? 'behind' : 'ahead';
      const word = dMs > 0 ? 'behind' : 'ahead';
      deltaHtml = `<div class="schedule-delta ${cls}">Running ${min} min ${word}</div>`;
    }
  }

  const cards = slice.map((m, i) => {
    let kind = '';
    if (i === 0) kind = 'on-field';
    else if (/on deck/i.test(m.status))     kind = 'on-deck';
    else if (/now queuing/i.test(m.status)) kind = 'now-queuing';
    return matchCardHtml(m, kind);
  }).join('');

  const listClass = placement === 'bottom' ? 'matches-row' : 'matches-list';
  el.innerHTML = `<div class="col-title">Matches</div>
    ${deltaHtml}
    <div class="${listClass}">${cards || '<div class="empty">No matches scheduled</div>'}</div>`;
}

function widgetUpdates(el, data) {
  const items = [];
  for (const a of (data?.announcements || [])) {
    items.push({ kind: 'announcement', body: a.announcement, when: a.postedTime });
  }
  for (const p of (data?.partsRequests || [])) {
    items.push({ kind: 'parts', body: p.parts, team: p.requestedByTeam, when: p.postedTime });
  }
  // Most-recent first
  items.sort((a, b) => (b.when || 0) - (a.when || 0));

  const html = items.map(i => {
    if (i.kind === 'parts') {
      return `<div class="update-item parts">
        <div class="src">Parts Request · <span class="team">Team ${esc(i.team || '?')}</span></div>
        <div class="body">${esc(i.body || '')}</div>
        <div class="when">${fmtTime(i.when)}</div>
      </div>`;
    }
    return `<div class="update-item">
      <div class="src">Announcement</div>
      <div class="body">${esc(i.body || '')}</div>
      <div class="when">${fmtTime(i.when)}</div>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="col-title">Updates</div>
    <div class="updates-list">${html || '<div class="empty">No active updates</div>'}</div>`;
}

let rankingsState = { rows: null, error: null };
async function fetchRankings() {
  if (!eventKey) return;
  try {
    const r = await fetch(`/api/tba/rankings/${encodeURIComponent(eventKey)}`, { cache: 'no-store' });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      rankingsState = { rows: null, error: j.error || `HTTP ${r.status}` };
      return;
    }
    const d = await r.json();
    rankingsState = { rows: d?.rankings || [], error: null };
  } catch (e) {
    rankingsState = { rows: null, error: e.message };
  }
}

// Sidebar pagination state — keyed by placement so sidebar+bottom rankings
// don't share an index when both happen to be enabled.
const rankingsPageIdx = { sidebar: 0, bottom: 0 };
const SIDEBAR_PAGE_SIZE = 22;
// Bottom rankings: 5 columns × 8 rows = 40 per page. 75-team divisions
// page as 40 + 35 (both fully populated 5-wide grids).
const BOTTOM_COLS       = 5;
const BOTTOM_ROWS_MAX   = 8;
const BOTTOM_PAGE_SIZE  = BOTTOM_COLS * BOTTOM_ROWS_MAX;
const RANKINGS_CYCLE_MS = 8000;

function rankRowHtml(r) {
  const team = (r.team_key || '').replace(/^frc/, '');
  // TBA exposes ranking points as the first element of extra_stats; the
  // label/precision live in the per-event extra_stats_info[0]. Show it as
  // "## RP" beside the team number.
  const rp = Array.isArray(r.extra_stats) && r.extra_stats.length ? r.extra_stats[0] : null;
  return `<div class="rank-row">
    <span class="rank ${r.rank <= 3 ? 'top3' : ''}">${r.rank}</span>
    <span class="team">${esc(team)}</span>
    ${rp != null ? `<span class="rp">${esc(rp)} RP</span>` : ''}
  </div>`;
}

function widgetRankings(el, placement) {
  const variant = placement === 'bottom' ? 'bottom' : 'sidebar';
  let body, titleSuffix = '', extraStyle = '';

  if (rankingsState.error) {
    body = `<div class="empty">Rankings unavailable: ${esc(rankingsState.error)}</div>`;
  } else if (!rankingsState.rows) {
    body = '<div class="empty">Loading…</div>';
  } else if (!rankingsState.rows.length) {
    body = '<div class="empty">No rankings yet</div>';
  } else {
    const rows = rankingsState.rows;

    if (variant === 'sidebar') {
      const totalPages = Math.max(1, Math.ceil(rows.length / SIDEBAR_PAGE_SIZE));
      if (rankingsPageIdx.sidebar >= totalPages) rankingsPageIdx.sidebar = 0;
      const page = rankingsPageIdx.sidebar;
      const slice = rows.slice(page * SIDEBAR_PAGE_SIZE, (page + 1) * SIDEBAR_PAGE_SIZE);
      body = slice.map(rankRowHtml).join('');
      if (totalPages > 1) titleSuffix = `<span class="rankings-page-indicator">page ${page + 1}/${totalPages}</span>`;
    } else {
      // Pick page size that splits evenly into BOTTOM_COLS so each page
      // renders as a full grid (no orphan column with 2 entries while the
      // rest have 6). Pick the smallest pages × cols × rows >= total.
      const totalPages = Math.max(1, Math.ceil(rows.length / BOTTOM_PAGE_SIZE));
      const rowsPerCol = Math.min(BOTTOM_ROWS_MAX, Math.ceil(rows.length / (totalPages * BOTTOM_COLS)));
      const perPage = rowsPerCol * BOTTOM_COLS;
      if (rankingsPageIdx.bottom >= totalPages) rankingsPageIdx.bottom = 0;
      const page = rankingsPageIdx.bottom;
      const slice = rows.slice(page * perPage, (page + 1) * perPage);
      body = slice.map(rankRowHtml).join('');
      // Explicit grid-template-rows so column-first flow knows how tall each
      // column is (otherwise auto-flow column would put everything in 1 col).
      const colsThisPage = Math.min(BOTTOM_COLS, Math.ceil(slice.length / rowsPerCol));
      extraStyle = `style="grid-template-rows: repeat(${rowsPerCol}, auto); grid-template-columns: repeat(${colsThisPage}, 1fr);"`;
      if (totalPages > 1) titleSuffix = `<span class="rankings-page-indicator">page ${page + 1}/${totalPages}</span>`;
    }
  }

  el.innerHTML = `<div class="col-title">Rankings${titleSuffix}</div>
    <div class="rankings-list ${variant}" ${extraStyle}>${body}</div>`;
}

// Cycle pages every 8s with a fade. Bottom and sidebar each track their own
// page index in case both slots happen to be rankings.
let rankingsCycleTimer = null;
function maybeStartRankingsCycle() {
  if (rankingsCycleTimer) return;
  const sidebarOn = sidebarKind === 'rankings';
  const bottomOn  = bottomKind  === 'rankings';
  if (!sidebarOn && !bottomOn) return;
  rankingsCycleTimer = setInterval(() => {
    if (!rankingsState.rows) return;
    const flipPage = (slot, size, container) => {
      if (rankingsState.rows.length <= size) return;
      const totalPages = Math.ceil(rankingsState.rows.length / size);
      rankingsPageIdx[slot] = (rankingsPageIdx[slot] + 1) % totalPages;
      const list = container.querySelector('.rankings-list');
      if (list) {
        list.classList.add('fade');
        setTimeout(() => widgetRankings(container, slot), 420);
      } else {
        widgetRankings(container, slot);
      }
    };
    if (sidebarOn) flipPage('sidebar', SIDEBAR_PAGE_SIZE, sidebarEl);
    // For bottom we paginate at the natural bottom page size (5 cols ×
    // BOTTOM_ROWS_MAX rows); pages use evenly-distributed perPage internally.
    if (bottomOn)  flipPage('bottom',  BOTTOM_PAGE_SIZE, bottomEl);
  }, RANKINGS_CYCLE_MS);
}

const widgets = {
  matches:  (el, data, placement) => widgetMatches(el, data, placement),
  updates:  (el, data, _placement) => widgetUpdates(el, data),
  rankings: (el, _data, placement) => widgetRankings(el, placement),
  none:     (el) => { el.innerHTML = ''; },
};

// ── Polling ──────────────────────────────────────────────────────────────────

const statusEl = document.getElementById('status');
const sidebarEl = document.getElementById('sidebar');
const bottomEl  = document.getElementById('bottom');

async function pollEvent() {
  if (!eventKey) {
    statusEl.classList.add('error'); statusEl.textContent = 'no event key in URL'; return;
  }
  try {
    const r = await fetch(`/api/nexus/event/${encodeURIComponent(eventKey)}`, { cache: 'no-store' });
    if (!r.ok) {
      statusEl.classList.add('error');
      statusEl.textContent = `event fetch failed: HTTP ${r.status}`;
      return;
    }
    const data = await r.json();
    (widgets[sidebarKind] || widgets.matches)(sidebarEl, data, 'sidebar');
    (widgets[bottomKind]  || widgets.updates)(bottomEl,  data, 'bottom');
    statusEl.classList.remove('error');
    lastSuccessfulFetch = Date.now();
    updateStatusLine();
  } catch (err) {
    statusEl.classList.add('error');
    statusEl.textContent = 'fetch error: ' + err.message;
  }
}

// Live-updating status line: shows current time (HH:MM, no seconds) so it
// keeps ticking between event polls. Updates every 30s — close enough that
// an HH:MM display never lags more than a tick.
let lastSuccessfulFetch = 0;
function updateStatusLine() {
  if (statusEl.classList.contains('error')) return;
  const t = new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  statusEl.textContent = `${eventKey} · ${t}`;
}
setInterval(updateStatusLine, 30000);

async function pollRankings() {
  if (sidebarKind !== 'rankings' && bottomKind !== 'rankings') return;
  await fetchRankings();
  if (sidebarKind === 'rankings') { widgetRankings(sidebarEl, 'sidebar'); maybeStartRankingsCycle(); }
  if (bottomKind  === 'rankings') widgetRankings(bottomEl, 'bottom');
}

pollEvent();
pollRankings();
setInterval(pollEvent,    15000);
setInterval(pollRankings, 60000);
</script>
