<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FRC Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
  /* Lite is a thin shell. Everything visual lives inside #stage, which loads
     server-rendered pages (/qr for home, /queuing, /youtube, etc.) so the
     UI is identical to what the daemon shows. No overlay, no buttons, no
     indicators — just the iframe. */
  #stage { position: fixed; inset: 0; width: 100%; height: 100%; border: 0;
    background: #000; display: block; }
  /* Invisible click-anywhere layer until the user has interacted once;
     fullscreen needs a user gesture, but we don't want a visible button.
     The layer hides itself after the first click. */
  #fs-trap { position: fixed; inset: 0; z-index: 1; cursor: pointer;
    background: transparent; }
  #fs-trap.gone { display: none; }
</style>
</head>
<body>

<iframe id="stage" allow="autoplay; fullscreen" allowfullscreen></iframe>
<div id="fs-trap" title="Click anywhere to enter fullscreen"></div>

<script>
// ── PIN persistence (localStorage, 4-day expiry) ────────────────────────────
const PIN_TTL_MS = 4 * 24 * 60 * 60 * 1000;
const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
function newPin() { return Array.from({length:6}, () => CHARS[Math.floor(Math.random()*CHARS.length)]).join(''); }
function loadPin() {
  try {
    const o = JSON.parse(localStorage.getItem('frc-lite-pin') || 'null');
    if (o?.pin && o.createdAt && Date.now() - o.createdAt < PIN_TTL_MS) return o.pin;
  } catch {}
  const pin = newPin();
  localStorage.setItem('frc-lite-pin', JSON.stringify({ pin, createdAt: Date.now() }));
  return pin;
}
function loadLastMode() { try { return JSON.parse(localStorage.getItem('frc-lite-lastmode') || 'null'); } catch { return null; } }
function saveLastMode(msg) { try { localStorage.setItem('frc-lite-lastmode', JSON.stringify(msg)); } catch {} }

const PIN = loadPin();

// ── Fullscreen on first interaction ─────────────────────────────────────────
document.getElementById('fs-trap').addEventListener('click', () => {
  const el = document.documentElement;
  const p = el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
  Promise.resolve(p).catch(() => {}).finally(() => {
    document.getElementById('fs-trap').classList.add('gone');
  });
});

// ── Stage iframe + mode handling ────────────────────────────────────────────
const stage = document.getElementById('stage');
const HOME_URL = `${location.origin}/qr?pin=${encodeURIComponent(PIN)}`;

function setStage(url) { if (stage.src !== url) stage.src = url; }
function showHome() { setStage(HOME_URL); }

function applyMode(msg) {
  if (msg.mode === 'home') { showHome(); saveLastMode(msg); return; }
  if (msg.mode === 'chromium' && msg.url) {
    // Daemon-side URLs hit http://localhost:3000 which a lite kiosk can't
    // reach; rewrite to the public origin where /youtube and /queuing are
    // mirrored.
    let url = msg.url;
    if (/^https?:\/\/localhost:3000/i.test(url)) {
      url = url.replace(/^https?:\/\/localhost:3000/i, location.origin);
    }
    setStage(url); saveLastMode(msg); return;
  }
  if (msg.mode === 'queuing' && msg.eventKey) {
    const u = new URL(`${location.origin}/queuing`);
    u.searchParams.set('event',   msg.eventKey);
    u.searchParams.set('stream',  msg.streamType === 'ndi' ? 'ndi' : 'youtube');
    u.searchParams.set('size',    String(msg.streamSize ?? 70));
    u.searchParams.set('sidebar', msg.sidebar ?? 'matches');
    u.searchParams.set('bottom',  msg.bottom  ?? 'updates');
    if (msg.streamSource) u.searchParams.set('streamId', msg.streamSource);
    setStage(u.toString()); saveLastMode(msg); return;
  }
  if (msg.mode === 'ndi') {
    // NDI needs X11 + ndi-play; not possible in a browser.
    if (ws?.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'error', message: 'NDI is not supported in lite mode (no daemon).' }));
    }
    return;
  }
}

// ── WebSocket: register as a 'lite' device ──────────────────────────────────
const wsUrl = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws/device`;
let ws = null;
let reconnectDelay = 1000;
let lastModeRehydrated = false;

function connect() {
  ws = new WebSocket(wsUrl);
  ws.onopen = () => {
    reconnectDelay = 1000;
    ws.send(JSON.stringify({
      type: 'register', pin: PIN, kind: 'lite',
      outputs: [{ id: 'screen', width: window.innerWidth, height: window.innerHeight }],
    }));
    if (!lastModeRehydrated) {
      lastModeRehydrated = true;
      const m = loadLastMode();
      if (m) applyMode(m); else showHome();
    }
  };
  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'set_mode') applyMode(msg);
    else if (msg.type === 'refresh_ndi') {
      // Lite has no NDI sources; reply empty so /control's button doesn't hang.
      if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ndi_sources', sources: [] }));
    }
    // set_audio_output / set_volume / set_mute / start_vnc_bridge: silently no-op
  };
  ws.onclose = () => {
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 8000);
  };
  ws.onerror = () => { try { ws.close(); } catch {} };
}

setInterval(() => { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'heartbeat' })); }, 30000);

connect();

// First-time visit (no saved mode) shows home; later visits will get
// rehydrated by lastModeRehydrated above on WS open. Render home eagerly so
// the page isn't briefly blank if the WS takes a moment to connect.
if (!loadLastMode()) showHome();
</script>
</body>
</html>
