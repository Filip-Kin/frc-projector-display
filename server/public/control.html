<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Configure Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 16px;
  }
  h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; color: #4af; }
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #1c1c1c;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 0.9rem;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
  }
  .dot.online { background: #4f4; }
  .dot.offline { background: #f44; }
  #connect-section { margin-bottom: 16px; }
  .pin-row { display: flex; gap: 8px; }
  input[type=text], input[type=url] {
    flex: 1;
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 8px;
    color: #f0f0f0;
    padding: 12px 14px;
    font-size: 1rem;
    outline: none;
  }
  input[type=text]:focus, input[type=url]:focus { border-color: #4af; }
  input[type=text]::placeholder { color: #555; }
  button {
    background: #4af;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  button:active { opacity: 0.8; }
  button.secondary {
    background: #333;
    color: #f0f0f0;
  }
  #recent-pins {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .pin-chip {
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    color: #ccc;
    white-space: nowrap;
  }
  .pin-chip:active { background: #2a2a2a; }
  .chip-time { color: #555; margin-left: 4px; }
  #control-section { display: none; }
  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666;
    margin: 20px 0 10px;
  }
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .mode-btn {
    background: #1c1c1c;
    border: 2px solid #2a2a2a;
    border-radius: 12px;
    color: #ccc;
    padding: 16px 12px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    line-height: 1.3;
    transition: border-color 0.15s, color 0.15s;
  }
  .mode-btn .icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
  .mode-btn.active {
    border-color: #4af;
    color: #4af;
    background: #0d1f2d;
  }
  .mode-config {
    background: #1c1c1c;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .mode-config.visible { display: block; }
  .mode-config label {
    display: block;
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 6px;
    margin-top: 12px;
  }
  .mode-config label:first-child { margin-top: 0; }
  select {
    width: 100%;
    background: #252525;
    border: 1px solid #333;
    border-radius: 8px;
    color: #f0f0f0;
    padding: 12px 14px;
    font-size: 0.95rem;
    outline: none;
  }
  .apply-row { display: flex; gap: 8px; margin-top: 14px; }
  .apply-row button { flex: 1; }
  #audio-section {
    background: #1c1c1c;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
  }
  #audio-section label {
    display: block;
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 6px;
  }
  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }
  #mute-btn {
    flex: 0 0 auto;
    padding: 10px 14px;
    font-size: 1.1rem;
    background: #252525;
    color: #f0f0f0;
  }
  input[type=range] {
    flex: 1;
    accent-color: #4af;
    height: 4px;
    cursor: pointer;
  }
  #volume-label {
    font-size: 0.85rem;
    color: #888;
    min-width: 38px;
    text-align: right;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #f0f0f0;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 0.85rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
  #screen-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  #screen-tabs.hidden { display: none; }
  .screen-tab {
    flex: 1;
    background: #1c1c1c;
    border: 2px solid #2a2a2a;
    border-radius: 10px;
    color: #888;
    padding: 10px 8px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    line-height: 1.3;
  }
  .screen-tab.active {
    border-color: #4af;
    color: #4af;
    background: #0d1f2d;
  }
  .screen-tab small {
    display: block;
    font-size: 0.68rem;
    color: #555;
    font-weight: 400;
    margin-top: 2px;
  }
  .screen-tab.active small { color: #4af; }
  #metrics-panel {
    background: #1c1c1c;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
    font-size: 0.82rem;
  }
  #metrics-panel.empty { color: #555; }
  .metric-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .metric-row:last-child { margin-bottom: 0; }
  .metric-label {
    color: #888;
    flex: 0 0 56px;
    font-size: 0.78rem;
  }
  .metric-bar {
    flex: 1;
    height: 6px;
    background: #252525;
    border-radius: 3px;
    overflow: hidden;
  }
  .metric-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #4af, #6cf);
    transition: width 0.4s;
  }
  .metric-bar-fill.warn { background: linear-gradient(90deg, #fa0, #fc4); }
  .metric-bar-fill.hot  { background: linear-gradient(90deg, #f44, #f86); }
  .metric-val {
    flex: 0 0 auto;
    color: #ccc;
    font-variant-numeric: tabular-nums;
    font-size: 0.78rem;
    min-width: 88px;
    text-align: right;
  }
  .metric-iface {
    flex: 0 0 auto;
    color: #555;
    font-size: 0.72rem;
  }
</style>
</head>
<body>

<h1>Configure Display</h1>

<div id="connect-section">
  <div class="pin-row">
    <input type="text" id="pin-input" list="pin-suggestions" placeholder="Enter PIN (e.g. A3X9K2)" maxlength="6" autocomplete="off" autocapitalize="characters">
    <datalist id="pin-suggestions"></datalist>
    <button id="connect-btn" onclick="connect()">Connect</button>
  </div>
  <div id="recent-pins"></div>
</div>

<div class="status-bar">
  <div class="dot" id="status-dot"></div>
  <span id="status-text" style="flex:1">Not connected</span>
  <button id="vnc-quick-btn" class="secondary" onclick="openVnc()" style="display:none;padding:7px 12px;font-size:0.82rem">🖥 VNC</button>
</div>

<div id="control-section">
  <div id="screen-tabs" class="hidden"></div>
  <div class="section-title">Display Mode</div>
  <div class="mode-grid">
    <div class="mode-btn" id="mode-home" onclick="selectMode('home')">
      <span class="icon">🏠</span>Home / QR
    </div>
    <div class="mode-btn" id="mode-ndi" onclick="selectMode('ndi')">
      <span class="icon">📡</span>NDI Monitor
    </div>
    <div class="mode-btn" id="mode-fim" onclick="selectMode('fim')">
      <span class="icon">📋</span>FIM Queuing
    </div>
    <div class="mode-btn" id="mode-nexus" onclick="selectMode('nexus')">
      <span class="icon">🔗</span>Nexus Queuing
    </div>
    <div class="mode-btn" id="mode-youtube" onclick="selectMode('youtube')">
      <span class="icon">▶️</span>YouTube Live
    </div>
    <div class="mode-btn" id="mode-url" onclick="selectMode('url')">
      <span class="icon">🌐</span>Custom URL
    </div>
    <div class="mode-btn" id="mode-queuing" onclick="selectMode('queuing')" style="grid-column: span 2">
      <span class="icon">📺</span>Queuing + Stream
    </div>
  </div>

  <!-- NDI / OMT config -->
  <div class="mode-config" id="config-ndi">
    <label>Video Source</label>
    <div style="display:flex;gap:8px">
      <select id="ndi-source-select" style="flex:1">
        <option value="">-- refreshing sources… --</option>
      </select>
    </div>
    <label style="margin-top:10px">Quality</label>
    <select id="ndi-bandwidth">
      <option value="high">High quality (NDI full)</option>
      <option value="low">Low bandwidth (NDI proxy)</option>
    </select>
    <div class="apply-row">
      <button onclick="applyMode()">Apply</button>
    </div>
  </div>

  <!-- FIM config -->
  <div class="mode-config" id="config-fim">
    <label>FIM Event Key</label>
    <input type="text" id="fim-key" placeholder="e.g. ABC123">
    <div class="apply-row"><button onclick="applyMode()">Apply</button></div>
  </div>

  <!-- Nexus config -->
  <div class="mode-config" id="config-nexus">
    <label>Nexus Event</label>
    <select id="nexus-event-select" style="display:none">
      <option value="">-- loading events… --</option>
    </select>
    <input type="text" id="nexus-event-input" placeholder="e.g. 2026curie">
    <div class="apply-row"><button onclick="applyMode()">Apply</button></div>
  </div>

  <!-- YouTube config -->
  <div class="mode-config" id="config-youtube">
    <label>YouTube URL or Video ID</label>
    <input type="text" id="youtube-id" placeholder="https://youtube.com/watch?v=... or video ID">
    <div class="apply-row"><button onclick="applyMode()">Apply</button></div>
  </div>

  <!-- Custom URL config -->
  <div class="mode-config" id="config-url">
    <label>URL</label>
    <input type="url" id="custom-url" placeholder="https://...">
    <div class="apply-row"><button onclick="applyMode()">Apply</button></div>
  </div>

  <!-- Queuing + Stream config -->
  <div class="mode-config" id="config-queuing">
    <label>Nexus Event</label>
    <select id="queuing-event-select" style="display:none">
      <option value="">-- loading events… --</option>
    </select>
    <input type="text" id="queuing-event-input" placeholder="e.g. 2026curie">

    <label style="margin-top:14px">Stream</label>
    <div style="display:flex;gap:6px">
      <button type="button" id="qs-youtube" class="secondary" onclick="setQueuingStream('youtube')" style="flex:1;padding:9px;font-size:0.85rem">YouTube</button>
      <button type="button" id="qs-ndi"     class="secondary" onclick="setQueuingStream('ndi')"     style="flex:1;padding:9px;font-size:0.85rem">NDI</button>
    </div>

    <div id="qs-youtube-fields">
      <label>YouTube URL or Video ID</label>
      <input type="text" id="queuing-youtube-id" placeholder="https://youtube.com/watch?v=... or video ID">
    </div>
    <div id="qs-ndi-fields" style="display:none">
      <label>NDI Source</label>
      <select id="queuing-ndi-select"><option value="">-- detecting sources… --</option></select>
    </div>

    <label style="margin-top:14px">Stream Size</label>
    <div style="display:flex;gap:6px">
      <button type="button" id="qs-size-70" class="secondary" onclick="setQueuingSize(70)" style="flex:1;padding:9px;font-size:0.85rem">70%</button>
      <button type="button" id="qs-size-60" class="secondary" onclick="setQueuingSize(60)" style="flex:1;padding:9px;font-size:0.85rem">60%</button>
    </div>

    <label style="margin-top:14px">Sidebar (left, full height)</label>
    <select id="queuing-sidebar">
      <option value="matches">Matches</option>
      <option value="updates">Updates (announcements + parts)</option>
      <option value="rankings">Rankings</option>
      <option value="none">— empty —</option>
    </select>

    <label style="margin-top:10px">Bottom (under stream)</label>
    <select id="queuing-bottom">
      <option value="updates">Updates (announcements + parts)</option>
      <option value="matches">Matches</option>
      <option value="rankings">Rankings</option>
      <option value="none">— empty —</option>
    </select>

    <div class="apply-row"><button onclick="applyMode()">Apply</button></div>
  </div>

  <!-- System metrics -->
  <div class="section-title">System</div>
  <div id="metrics-panel" class="empty">Waiting for metrics…</div>

  <!-- Audio controls -->
  <div class="section-title">Audio</div>
  <div id="audio-section">
    <label>Output Device</label>
    <select id="audio-sink-select" onchange="setAudioOutput(this.value)">
      <option value="">-- detecting… --</option>
    </select>
    <div class="volume-row">
      <button id="mute-btn" class="secondary" onclick="toggleMute()">🔊</button>
      <input type="range" id="volume-slider" min="0" max="100" value="100" oninput="onVolumeInput(this.value)">
      <span id="volume-label">100%</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let ws = null;
let currentPin = '';
let selectedMode = null;
let ndiSources = [];
let ndiRefreshTimer = null;
let reconnectTimer = null;
let isMuted = false;
let nexusEvents = [];
let outputs = [];          // [{ id, width, height }]
let currentOutput = null;  // currently selected output id
let outputState = {};      // { [outputId]: { mode, params } } — last applied per output
let queuingStream = 'youtube';
let queuingSize = 70;

// ── Init ──────────────────────────────────────────────────────────────────────

renderRecentPins();
loadNexusEvents();

const prePin = new URLSearchParams(location.search).get('pin');
if (prePin) {
  document.getElementById('pin-input').value = prePin.toUpperCase();
  setTimeout(connect, 200);
}

// ── Recent PINs ───────────────────────────────────────────────────────────────

function saveRecentPin(pin) {
  let recents = JSON.parse(localStorage.getItem('recentPins') || '[]');
  recents = recents.filter(r => r.pin !== pin);
  recents.unshift({ pin, lastUsed: Date.now() });
  recents = recents.slice(0, 3);
  localStorage.setItem('recentPins', JSON.stringify(recents));
  renderRecentPins();
}

function renderRecentPins() {
  const recents = JSON.parse(localStorage.getItem('recentPins') || '[]');
  const dl = document.getElementById('pin-suggestions');
  dl.innerHTML = recents.map(r => `<option value="${r.pin}">`).join('');
  const el = document.getElementById('recent-pins');
  if (!recents.length) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = recents.map(r =>
    `<div class="pin-chip" onclick="connectTo('${r.pin}')">${r.pin}<span class="chip-time">${relTime(r.lastUsed)}</span></div>`
  ).join('');
}

function relTime(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return ' · just now';
  if (d < 3600000) return ` · ${Math.floor(d / 60000)}m ago`;
  if (d < 86400000) return ` · ${Math.floor(d / 3600000)}h ago`;
  return ` · ${Math.floor(d / 86400000)}d ago`;
}

function connectTo(pin) {
  document.getElementById('pin-input').value = pin;
  connect();
}

// ── WebSocket ─────────────────────────────────────────────────────────────────

function wsUrl(path) {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${proto}//${location.host}${path}`;
}

function connect() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  const pin = document.getElementById('pin-input').value.trim().toUpperCase();
  if (!pin || pin.length < 4) { toast('Enter a valid PIN'); return; }
  currentPin = pin;
  history.replaceState(null, '', `?pin=${pin}`);

  if (ws) { ws.onclose = null; ws.onerror = null; ws.close(); ws = null; }

  setStatus('connecting', `Connecting (PIN: ${pin})…`);
  ws = new WebSocket(wsUrl(`/ws/control?pin=${pin}`));

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'device_connected') {
      saveRecentPin(pin);
      setStatus('online', `Connected · PIN ${pin}`);
      document.getElementById('control-section').style.display = 'block';
      document.getElementById('vnc-quick-btn').style.display = '';
      if (msg.outputs) updateOutputs(msg.outputs);
      if (msg.ndiSources) updateNdiSources(msg.ndiSources);
      if (msg.audioSinks) updateAudioSinks(msg.audioSinks, msg.audioState);
      if (msg.metrics) updateMetrics(msg.metrics);
    } else if (msg.type === 'device_disconnected') {
      setStatus('offline', `Waiting for device (PIN: ${pin})`);
      document.getElementById('control-section').style.display = 'none';
      document.getElementById('vnc-quick-btn').style.display = 'none';
    } else if (msg.type === 'ndi_sources') {
      updateNdiSources(msg.sources);
    } else if (msg.type === 'audio_sinks') {
      updateAudioSinks(msg.sinks, msg.state);
    } else if (msg.type === 'metrics') {
      updateMetrics(msg.metrics);
    } else if (msg.type === 'error') {
      toast(msg.message);
    }
  };

  ws.onclose = () => {
    setStatus('offline', 'Reconnecting…');
    document.getElementById('control-section').style.display = 'none';
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => toast('WebSocket error');
}

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'dot ' + (state === 'online' ? 'online' : state === 'offline' ? 'offline' : '');
  document.getElementById('status-text').textContent = text;
}

function sendMsg(msg) {
  if (!ws || ws.readyState !== WebSocket.OPEN) { toast('Not connected'); return false; }
  ws.send(JSON.stringify(msg));
  return true;
}

// ── Output (screen) tabs ─────────────────────────────────────────────────────

function updateOutputs(list) {
  outputs = list || [];
  const el = document.getElementById('screen-tabs');
  if (outputs.length <= 1) {
    el.classList.add('hidden');
    currentOutput = outputs[0]?.id || null;
    return;
  }
  el.classList.remove('hidden');
  if (!currentOutput || !outputs.find(o => o.id === currentOutput)) currentOutput = outputs[0].id;
  el.innerHTML = outputs.map((o, i) =>
    `<div class="screen-tab ${o.id === currentOutput ? 'active' : ''}" onclick="selectOutput('${o.id}')">Screen ${i+1}<small>${o.id} · ${o.width}×${o.height}</small></div>`
  ).join('');
  showOutputState(currentOutput);
}

function selectOutput(id) {
  currentOutput = id;
  document.querySelectorAll('.screen-tab').forEach(t => t.classList.remove('active'));
  Array.from(document.querySelectorAll('.screen-tab')).find(t => t.textContent.includes(id))?.classList.add('active');
  showOutputState(id);
}

function showOutputState(id) {
  // Reflect this output's last-applied mode in the UI (if any).
  // Modes that haven't been touched on this output show no active selection.
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.mode-config').forEach(c => c.classList.remove('visible'));
  selectedMode = null;
  const s = outputState[id];
  if (s?.mode) {
    selectedMode = s.mode;
    document.getElementById('mode-' + s.mode)?.classList.add('active');
    const cfg = document.getElementById('config-' + s.mode);
    if (cfg) cfg.classList.add('visible');
  }
}

// ── Mode selection ────────────────────────────────────────────────────────────

function selectMode(mode) {
  if (mode === 'fta') return;

  // Clear NDI auto-refresh from previous mode
  if (ndiRefreshTimer) { clearInterval(ndiRefreshTimer); ndiRefreshTimer = null; }

  selectedMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-' + mode)?.classList.add('active');
  document.querySelectorAll('.mode-config').forEach(c => c.classList.remove('visible'));
  const cfg = document.getElementById('config-' + mode);
  if (cfg) cfg.classList.add('visible');

  if (mode === 'home') {
    sendMsg({ type: 'set_mode', mode: 'home', output: currentOutput });
    if (currentOutput) outputState[currentOutput] = { mode: 'home' };
  } else if (mode === 'ndi') {
    sendMsg({ type: 'refresh_ndi' });
    ndiRefreshTimer = setInterval(() => sendMsg({ type: 'refresh_ndi' }), 20000);
  } else if (mode === 'queuing') {
    setQueuingStream(queuingStream);
    setQueuingSize(queuingSize);
    // Need NDI sources too in case the user picks NDI for the corner
    sendMsg({ type: 'refresh_ndi' });
    ndiRefreshTimer = setInterval(() => sendMsg({ type: 'refresh_ndi' }), 20000);
  }
}

function setQueuingStream(t) {
  queuingStream = t;
  document.getElementById('qs-youtube').style.background = t === 'youtube' ? '#333' : '#252525';
  document.getElementById('qs-ndi'    ).style.background = t === 'ndi'     ? '#333' : '#252525';
  document.getElementById('qs-youtube-fields').style.display = t === 'youtube' ? '' : 'none';
  document.getElementById('qs-ndi-fields'    ).style.display = t === 'ndi'     ? '' : 'none';
  if (t === 'ndi') populateQueuingNdi();
}
function setQueuingSize(n) {
  queuingSize = n;
  document.getElementById('qs-size-70').style.background = n === 70 ? '#333' : '#252525';
  document.getElementById('qs-size-60').style.background = n === 60 ? '#333' : '#252525';
}
function populateQueuingNdi() {
  const sel = document.getElementById('queuing-ndi-select');
  const prev = sel.value;
  sel.innerHTML = ndiSources.length
    ? ndiSources.map(s => {
        const label = typeof s === 'object' ? s.label : s;
        const val   = typeof s === 'object' ? s.value : s;
        return `<option value="${val}">${label}</option>`;
      }).join('')
    : '<option value="">-- no sources found --</option>';
  if (prev && ndiSources.some(s => (typeof s === 'object' ? s.value : s) === prev)) sel.value = prev;
}

function applyMode() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { toast('Not connected'); return; }
  let msg;
  switch (selectedMode) {
    case 'ndi': {
      const src = document.getElementById('ndi-source-select').value;
      if (!src) { toast('Select a video source'); return; }
      const bandwidth = document.getElementById('ndi-bandwidth').value;
      if (src.startsWith('omt://')) {
        toast('OMT playback not yet supported — use the NDI source from the same device');
        return;
      }
      msg = { type: 'set_mode', mode: 'ndi', source: src, bandwidth };
      break;
    }
    case 'fim': {
      const key = document.getElementById('fim-key').value.trim();
      if (!key) { toast('Enter FIM event key'); return; }
      msg = { type: 'set_mode', mode: 'chromium', url: `https://fim-queueing.web.app/?key=${key}` };
      break;
    }
    case 'nexus': {
      const sel = document.getElementById('nexus-event-select');
      const inp = document.getElementById('nexus-event-input');
      const ev = sel.style.display !== 'none' ? sel.value : inp.value.trim();
      if (!ev) { toast('Select or enter Nexus event ID'); return; }
      msg = { type: 'set_mode', mode: 'chromium', url: `https://frc.nexus/en/event/${ev}/display/pit` };
      break;
    }
    case 'youtube': {
      const val = document.getElementById('youtube-id').value.trim();
      if (!val) { toast('Enter YouTube URL or ID'); return; }
      const id = extractYouTubeId(val);
      if (!id) { toast('Could not parse YouTube video ID'); return; }
      msg = { type: 'set_mode', mode: 'chromium', url: `http://localhost:3000/youtube?v=${id}` };
      break;
    }
    case 'url': {
      let u = document.getElementById('custom-url').value.trim();
      if (!u) { toast('Enter a URL'); return; }
      if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
      msg = { type: 'set_mode', mode: 'chromium', url: u };
      break;
    }
    case 'queuing': {
      const sel = document.getElementById('queuing-event-select');
      const inp = document.getElementById('queuing-event-input');
      const eventKey = sel.style.display !== 'none' ? sel.value : inp.value.trim();
      if (!eventKey) { toast('Select or enter a Nexus event'); return; }
      let streamSource = '';
      if (queuingStream === 'youtube') {
        const v = document.getElementById('queuing-youtube-id').value.trim();
        if (!v) { toast('Enter YouTube URL or ID'); return; }
        const id = extractYouTubeId(v);
        if (!id) { toast('Could not parse YouTube video ID'); return; }
        streamSource = id;
      } else {
        streamSource = document.getElementById('queuing-ndi-select').value;
        if (!streamSource) { toast('Select an NDI source'); return; }
        if (streamSource.startsWith('omt://')) { toast('OMT not supported yet'); return; }
      }
      const sidebar = document.getElementById('queuing-sidebar').value;
      const bottom  = document.getElementById('queuing-bottom').value;
      msg = { type: 'set_mode', mode: 'queuing', eventKey,
              streamType: queuingStream, streamSource, streamSize: queuingSize,
              sidebar, bottom };
      break;
    }
    default: toast('Select a mode first'); return;
  }
  msg.output = currentOutput;
  ws.send(JSON.stringify(msg));
  if (currentOutput) outputState[currentOutput] = { mode: selectedMode };
  toast(currentOutput && outputs.length > 1 ? `Sent to ${currentOutput}` : 'Sent!');
}

// ── NDI ───────────────────────────────────────────────────────────────────────

function updateNdiSources(sources) {
  // Filter out OMT sources — playback not yet supported on Linux
  ndiSources = (sources || []).filter(s => {
    const val = typeof s === 'object' ? s.value : s;
    return !val.startsWith('omt://');
  });
  const sel = document.getElementById('ndi-source-select');
  const prev = sel.value;
  sel.innerHTML = ndiSources.length
    ? ndiSources.map(s => {
        const label = typeof s === 'object' ? s.label : s;
        const val = typeof s === 'object' ? s.value : s;
        return `<option value="${val}">${label}</option>`;
      }).join('')
    : '<option value="">-- no sources found --</option>';
  const prevValid = ndiSources.some(s => (typeof s === 'object' ? s.value : s) === prev);
  if (prev && prevValid) sel.value = prev;
  if (selectedMode === 'queuing' && queuingStream === 'ndi') populateQueuingNdi();
}

// ── YouTube ───────────────────────────────────────────────────────────────────

function extractYouTubeId(val) {
  // Handles: ?v=, youtu.be/, /live/, /embed/, /shorts/
  const m = val.match(/(?:[?&]v=|youtu\.be\/|\/(?:live|embed|shorts)\/)([A-Za-z0-9_-]{11})/);
  if (m) return m[1];
  if (/^[A-Za-z0-9_-]{11}$/.test(val)) return val;
  return null;
}

// ── Nexus events ──────────────────────────────────────────────────────────────

async function loadNexusEvents() {
  try {
    const r = await fetch('/api/nexus/events');
    const events = await r.json();
    if (events.length) {
      nexusEvents = events;
      const html = events.map(e => `<option value="${e.key}">${e.name} (${e.key})</option>`).join('');
      for (const id of ['nexus-event-select', 'queuing-event-select']) {
        const sel = document.getElementById(id);
        if (sel) { sel.innerHTML = html; sel.style.display = ''; }
      }
      document.getElementById('nexus-event-input').style.display = 'none';
      const qInput = document.getElementById('queuing-event-input');
      if (qInput) qInput.style.display = 'none';
    }
  } catch {}
}

// ── Audio ─────────────────────────────────────────────────────────────────────

function updateAudioSinks(sinks, state) {
  const sel = document.getElementById('audio-sink-select');
  sel.innerHTML = (sinks && sinks.length)
    ? sinks.map(s => `<option value="${s.name}">${s.description}</option>`).join('')
    : '<option value="">-- no sinks found --</option>';
  if (state) {
    if (state.sink) sel.value = state.sink;
    document.getElementById('volume-slider').value = state.volume ?? 100;
    document.getElementById('volume-label').textContent = (state.volume ?? 100) + '%';
    isMuted = !!state.muted;
    document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
  }
}

function setAudioOutput(sink) {
  sendMsg({ type: 'set_audio_output', sink });
}

let volumeDebounce = null;
function onVolumeInput(val) {
  document.getElementById('volume-label').textContent = val + '%';
  clearTimeout(volumeDebounce);
  volumeDebounce = setTimeout(() => sendMsg({ type: 'set_volume', volume: parseInt(val) }), 150);
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
  sendMsg({ type: 'set_mute', muted: isMuted });
}

// ── Metrics ───────────────────────────────────────────────────────────────────

function metricBarClass(pct) {
  return pct >= 85 ? 'hot' : pct >= 65 ? 'warn' : '';
}
function fmtKBps(v) {
  if (v >= 1024) return (v / 1024).toFixed(1) + ' MB/s';
  return v.toFixed(1) + ' KB/s';
}
function updateMetrics(m) {
  if (!m) return;
  const memPct = m.mem.totalMB ? Math.round(100 * m.mem.usedMB / m.mem.totalMB) : 0;
  const el = document.getElementById('metrics-panel');
  el.classList.remove('empty');
  el.innerHTML = `
    <div class="metric-row">
      <span class="metric-label">CPU</span>
      <div class="metric-bar"><div class="metric-bar-fill ${metricBarClass(m.cpu)}" style="width:${m.cpu}%"></div></div>
      <span class="metric-val">${m.cpu}%</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">RAM</span>
      <div class="metric-bar"><div class="metric-bar-fill ${metricBarClass(memPct)}" style="width:${memPct}%"></div></div>
      <span class="metric-val">${m.mem.usedMB} / ${m.mem.totalMB} MB</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">Net</span>
      <span class="metric-val" style="min-width:auto;color:#6cf">↓ ${fmtKBps(m.net.rxKBps)}</span>
      <span class="metric-val" style="min-width:auto;color:#fc8">↑ ${fmtKBps(m.net.txKBps)}</span>
      <span class="metric-iface">${m.net.iface}</span>
    </div>`;
}

function openVnc() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { toast('Not connected'); return; }
  sendMsg({ type: 'start_vnc_bridge' });
  window.open(`/vnc/${currentPin}`, '_blank');
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Keyboard ──────────────────────────────────────────────────────────────────

document.getElementById('pin-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') connect();
});
</script>
