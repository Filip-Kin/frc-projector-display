<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Configure Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 16px;
  }
  h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; color: #4af; }
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #1c1c1c;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 0.9rem;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
  }
  .dot.online { background: #4f4; }
  .dot.offline { background: #f44; }
  #connect-section { margin-bottom: 16px; }
  .pin-row { display: flex; gap: 8px; }
  input[type=text], input[type=url] {
    flex: 1;
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 8px;
    color: #f0f0f0;
    padding: 12px 14px;
    font-size: 1rem;
    outline: none;
  }
  input[type=text]:focus, input[type=url]:focus { border-color: #4af; }
  input[type=text]::placeholder { color: #555; }
  button {
    background: #4af;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  button:active { opacity: 0.8; }
  button.secondary {
    background: #333;
    color: #f0f0f0;
  }
  #recent-pins {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .pin-chip {
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    color: #ccc;
    white-space: nowrap;
  }
  .pin-chip:active { background: #2a2a2a; }
  .chip-time { color: #555; margin-left: 4px; }
  #control-section { display: none; }
  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666;
    margin: 20px 0 10px;
  }
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .mode-btn {
    background: #1c1c1c;
    border: 2px solid #2a2a2a;
    border-radius: 12px;
    color: #ccc;
    padding: 16px 12px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    line-height: 1.3;
    transition: border-color 0.15s, color 0.15s;
  }
  .mode-btn .icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
  .mode-btn.active {
    border-color: #4af;
    color: #4af;
    background: #0d1f2d;
  }
  .mode-config {
    background: #1c1c1c;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .mode-config.visible { display: block; }
  .mode-config label {
    display: block;
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 6px;
    margin-top: 12px;
  }
  .mode-config label:first-child { margin-top: 0; }
  select {
    width: 100%;
    background: #252525;
    border: 1px solid #333;
    border-radius: 8px;
    color: #f0f0f0;
    padding: 12px 14px;
    font-size: 0.95rem;
    outline: none;
  }
  .apply-row { display: flex; gap: 8px; margin-top: 14px; }
  .apply-row button { flex: 1; }
  #audio-section {
    background: #1c1c1c;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
  }
  #audio-section label {
    display: block;
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 6px;
  }
  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }
  #mute-btn {
    flex: 0 0 auto;
    padding: 10px 14px;
    font-size: 1.1rem;
    background: #252525;
    color: #f0f0f0;
  }
  input[type=range] {
    flex: 1;
    accent-color: #4af;
    height: 4px;
    cursor: pointer;
  }
  #volume-label {
    font-size: 0.85rem;
    color: #888;
    min-width: 38px;
    text-align: right;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #f0f0f0;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 0.85rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>Configure Display</h1>

<div id="connect-section">
  <div class="pin-row">
    <input type="text" id="pin-input" list="pin-suggestions" placeholder="Enter PIN (e.g. A3X9K2)" maxlength="6" autocomplete="off" autocapitalize="characters">
    <datalist id="pin-suggestions"></datalist>
    <button id="connect-btn" onclick="connect()">Connect</button>
  </div>
  <div id="recent-pins"></div>
</div>

<div class="status-bar">
  <div class="dot" id="status-dot"></div>
  <span id="status-text" style="flex:1">Not connected</span>
  <button id="vnc-quick-btn" class="secondary" onclick="openVnc()" style="display:none;padding:7px 12px;font-size:0.82rem">🖥 VNC</button>
</div>

<div id="control-section">
  <div class="section-title">Display Mode</div>
  <div class="mode-grid">
    <div class="mode-btn" id="mode-home" onclick="selectMode('home')">
      <span class="icon">🏠</span>Home / QR
    </div>
    <div class="mode-btn" id="mode-ndi" onclick="selectMode('ndi')">
      <span class="icon">📡</span>NDI Monitor
    </div>
    <div class="mode-btn" id="mode-fim" onclick="selectMode('fim')">
      <span class="icon">📋</span>FIM Queuing
    </div>
    <div class="mode-btn" id="mode-nexus" onclick="selectMode('nexus')">
      <span class="icon">🔗</span>Nexus Queuing
    </div>
    <div class="mode-btn" id="mode-youtube" onclick="selectMode('youtube')">
      <span class="icon">▶️</span>YouTube Live
    </div>
    <div class="mode-btn" id="mode-url" onclick="selectMode('url')">
      <span class="icon">🌐</span>Custom URL
    </div>
  </div>

  <!-- NDI / OMT config -->
  <div class="mode-config" id="config-ndi">
    <label>Video Source</label>
    <div style="display:flex;gap:8px">
      <select id="ndi-source-select" style="flex:1">
        <option value="">-- refreshing sources… --</option>
      </select>
    </div>
    <label style="margin-top:10px">Quality</label>
    <select id="ndi-bandwidth">
      <option value="high">High quality (NDI full)</option>
      <option value="low">Low bandwidth (NDI proxy)</option>
    </select>
    <div class="apply-row">
      <button onclick="applyMode()">Apply</button>
    </div>
  </div>

  <!-- FIM config -->
  <div class="mode-config" id="config-fim">
    <label>FIM Event Key</label>
    <input type="text" id="fim-key" placeholder="e.g. ABC123">
    <div class="apply-row"><button onclick="applyMode()">Apply</button></div>
  </div>

  <!-- Nexus config -->
  <div class="mode-config" id="config-nexus">
    <label>Nexus Event</label>
    <select id="nexus-event-select" style="display:none">
      <option value="">-- loading events… --</option>
    </select>
    <input type="text" id="nexus-event-input" placeholder="e.g. 2026curie">
    <div class="apply-row"><button onclick="applyMode()">Apply</button></div>
  </div>

  <!-- YouTube config -->
  <div class="mode-config" id="config-youtube">
    <label>YouTube URL or Video ID</label>
    <input type="text" id="youtube-id" placeholder="https://youtube.com/watch?v=... or video ID">
    <div class="apply-row"><button onclick="applyMode()">Apply</button></div>
  </div>

  <!-- Custom URL config -->
  <div class="mode-config" id="config-url">
    <label>URL</label>
    <input type="url" id="custom-url" placeholder="https://...">
    <div class="apply-row"><button onclick="applyMode()">Apply</button></div>
  </div>

  <!-- Audio controls -->
  <div class="section-title">Audio</div>
  <div id="audio-section">
    <label>Output Device</label>
    <select id="audio-sink-select" onchange="setAudioOutput(this.value)">
      <option value="">-- detecting… --</option>
    </select>
    <div class="volume-row">
      <button id="mute-btn" class="secondary" onclick="toggleMute()">🔊</button>
      <input type="range" id="volume-slider" min="0" max="100" value="100" oninput="onVolumeInput(this.value)">
      <span id="volume-label">100%</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let ws = null;
let currentPin = '';
let selectedMode = null;
let ndiSources = [];
let ndiRefreshTimer = null;
let reconnectTimer = null;
let isMuted = false;
let nexusEvents = [];

// ── Init ──────────────────────────────────────────────────────────────────────

renderRecentPins();
loadNexusEvents();

const prePin = new URLSearchParams(location.search).get('pin');
if (prePin) {
  document.getElementById('pin-input').value = prePin.toUpperCase();
  setTimeout(connect, 200);
}

// ── Recent PINs ───────────────────────────────────────────────────────────────

function saveRecentPin(pin) {
  let recents = JSON.parse(localStorage.getItem('recentPins') || '[]');
  recents = recents.filter(r => r.pin !== pin);
  recents.unshift({ pin, lastUsed: Date.now() });
  recents = recents.slice(0, 3);
  localStorage.setItem('recentPins', JSON.stringify(recents));
  renderRecentPins();
}

function renderRecentPins() {
  const recents = JSON.parse(localStorage.getItem('recentPins') || '[]');
  const dl = document.getElementById('pin-suggestions');
  dl.innerHTML = recents.map(r => `<option value="${r.pin}">`).join('');
  const el = document.getElementById('recent-pins');
  if (!recents.length) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = recents.map(r =>
    `<div class="pin-chip" onclick="connectTo('${r.pin}')">${r.pin}<span class="chip-time">${relTime(r.lastUsed)}</span></div>`
  ).join('');
}

function relTime(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return ' · just now';
  if (d < 3600000) return ` · ${Math.floor(d / 60000)}m ago`;
  if (d < 86400000) return ` · ${Math.floor(d / 3600000)}h ago`;
  return ` · ${Math.floor(d / 86400000)}d ago`;
}

function connectTo(pin) {
  document.getElementById('pin-input').value = pin;
  connect();
}

// ── WebSocket ─────────────────────────────────────────────────────────────────

function wsUrl(path) {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${proto}//${location.host}${path}`;
}

function connect() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  const pin = document.getElementById('pin-input').value.trim().toUpperCase();
  if (!pin || pin.length < 4) { toast('Enter a valid PIN'); return; }
  currentPin = pin;
  history.replaceState(null, '', `?pin=${pin}`);

  if (ws) { ws.onclose = null; ws.onerror = null; ws.close(); ws = null; }

  setStatus('connecting', `Connecting (PIN: ${pin})…`);
  ws = new WebSocket(wsUrl(`/ws/control?pin=${pin}`));

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'device_connected') {
      saveRecentPin(pin);
      setStatus('online', `Connected · PIN ${pin}`);
      document.getElementById('control-section').style.display = 'block';
      document.getElementById('vnc-quick-btn').style.display = '';
      if (msg.ndiSources) updateNdiSources(msg.ndiSources);
      if (msg.audioSinks) updateAudioSinks(msg.audioSinks, msg.audioState);
    } else if (msg.type === 'device_disconnected') {
      setStatus('offline', `Waiting for device (PIN: ${pin})`);
      document.getElementById('control-section').style.display = 'none';
      document.getElementById('vnc-quick-btn').style.display = 'none';
    } else if (msg.type === 'ndi_sources') {
      updateNdiSources(msg.sources);
    } else if (msg.type === 'audio_sinks') {
      updateAudioSinks(msg.sinks, msg.state);
    } else if (msg.type === 'error') {
      toast(msg.message);
    }
  };

  ws.onclose = () => {
    setStatus('offline', 'Reconnecting…');
    document.getElementById('control-section').style.display = 'none';
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => toast('WebSocket error');
}

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'dot ' + (state === 'online' ? 'online' : state === 'offline' ? 'offline' : '');
  document.getElementById('status-text').textContent = text;
}

function sendMsg(msg) {
  if (!ws || ws.readyState !== WebSocket.OPEN) { toast('Not connected'); return false; }
  ws.send(JSON.stringify(msg));
  return true;
}

// ── Mode selection ────────────────────────────────────────────────────────────

function selectMode(mode) {
  if (mode === 'fta') return;

  // Clear NDI auto-refresh from previous mode
  if (ndiRefreshTimer) { clearInterval(ndiRefreshTimer); ndiRefreshTimer = null; }

  selectedMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-' + mode)?.classList.add('active');
  document.querySelectorAll('.mode-config').forEach(c => c.classList.remove('visible'));
  const cfg = document.getElementById('config-' + mode);
  if (cfg) cfg.classList.add('visible');

  if (mode === 'home') {
    sendMsg({ type: 'set_mode', mode: 'home' });
  } else if (mode === 'ndi') {
    sendMsg({ type: 'refresh_ndi' });
    ndiRefreshTimer = setInterval(() => sendMsg({ type: 'refresh_ndi' }), 20000);
  }
}

function applyMode() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { toast('Not connected'); return; }
  let msg;
  switch (selectedMode) {
    case 'ndi': {
      const src = document.getElementById('ndi-source-select').value;
      if (!src) { toast('Select a video source'); return; }
      const bandwidth = document.getElementById('ndi-bandwidth').value;
      if (src.startsWith('omt://')) {
        toast('OMT playback not yet supported — use the NDI source from the same device');
        return;
      }
      msg = { type: 'set_mode', mode: 'ndi', source: src, bandwidth };
      break;
    }
    case 'fim': {
      const key = document.getElementById('fim-key').value.trim();
      if (!key) { toast('Enter FIM event key'); return; }
      msg = { type: 'set_mode', mode: 'chromium', url: `https://fim-queueing.web.app/?key=${key}` };
      break;
    }
    case 'nexus': {
      const sel = document.getElementById('nexus-event-select');
      const inp = document.getElementById('nexus-event-input');
      const ev = sel.style.display !== 'none' ? sel.value : inp.value.trim();
      if (!ev) { toast('Select or enter Nexus event ID'); return; }
      msg = { type: 'set_mode', mode: 'chromium', url: `https://frc.nexus/en/event/${ev}/display/pit` };
      break;
    }
    case 'youtube': {
      const val = document.getElementById('youtube-id').value.trim();
      if (!val) { toast('Enter YouTube URL or ID'); return; }
      const id = extractYouTubeId(val);
      if (!id) { toast('Could not parse YouTube video ID'); return; }
      msg = { type: 'set_mode', mode: 'chromium', url: `http://localhost:3000/youtube?v=${id}` };
      break;
    }
    case 'url': {
      let u = document.getElementById('custom-url').value.trim();
      if (!u) { toast('Enter a URL'); return; }
      if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
      msg = { type: 'set_mode', mode: 'chromium', url: u };
      break;
    }
    default: toast('Select a mode first'); return;
  }
  ws.send(JSON.stringify(msg));
  toast('Sent!');
}

// ── NDI ───────────────────────────────────────────────────────────────────────

function updateNdiSources(sources) {
  // Filter out OMT sources — playback not yet supported on Linux
  ndiSources = (sources || []).filter(s => {
    const val = typeof s === 'object' ? s.value : s;
    return !val.startsWith('omt://');
  });
  const sel = document.getElementById('ndi-source-select');
  const prev = sel.value;
  sel.innerHTML = ndiSources.length
    ? ndiSources.map(s => {
        const label = typeof s === 'object' ? s.label : s;
        const val = typeof s === 'object' ? s.value : s;
        return `<option value="${val}">${label}</option>`;
      }).join('')
    : '<option value="">-- no sources found --</option>';
  const prevValid = ndiSources.some(s => (typeof s === 'object' ? s.value : s) === prev);
  if (prev && prevValid) sel.value = prev;
}

// ── YouTube ───────────────────────────────────────────────────────────────────

function extractYouTubeId(val) {
  // Handles: ?v=, youtu.be/, /live/, /embed/, /shorts/
  const m = val.match(/(?:[?&]v=|youtu\.be\/|\/(?:live|embed|shorts)\/)([A-Za-z0-9_-]{11})/);
  if (m) return m[1];
  if (/^[A-Za-z0-9_-]{11}$/.test(val)) return val;
  return null;
}

// ── Nexus events ──────────────────────────────────────────────────────────────

async function loadNexusEvents() {
  try {
    const r = await fetch('/api/nexus/events');
    const events = await r.json();
    if (events.length) {
      nexusEvents = events;
      const sel = document.getElementById('nexus-event-select');
      sel.innerHTML = events.map(e => `<option value="${e.key}">${e.name} (${e.key})</option>`).join('');
      sel.style.display = '';
      document.getElementById('nexus-event-input').style.display = 'none';
    }
  } catch {}
}

// ── Audio ─────────────────────────────────────────────────────────────────────

function updateAudioSinks(sinks, state) {
  const sel = document.getElementById('audio-sink-select');
  sel.innerHTML = (sinks && sinks.length)
    ? sinks.map(s => `<option value="${s.name}">${s.description}</option>`).join('')
    : '<option value="">-- no sinks found --</option>';
  if (state) {
    if (state.sink) sel.value = state.sink;
    document.getElementById('volume-slider').value = state.volume ?? 100;
    document.getElementById('volume-label').textContent = (state.volume ?? 100) + '%';
    isMuted = !!state.muted;
    document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
  }
}

function setAudioOutput(sink) {
  sendMsg({ type: 'set_audio_output', sink });
}

let volumeDebounce = null;
function onVolumeInput(val) {
  document.getElementById('volume-label').textContent = val + '%';
  clearTimeout(volumeDebounce);
  volumeDebounce = setTimeout(() => sendMsg({ type: 'set_volume', volume: parseInt(val) }), 150);
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
  sendMsg({ type: 'set_mute', muted: isMuted });
}

function openVnc() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { toast('Not connected'); return; }
  sendMsg({ type: 'start_vnc_bridge' });
  window.open(`/vnc/${currentPin}`, '_blank');
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Keyboard ──────────────────────────────────────────────────────────────────

document.getElementById('pin-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') connect();
});
</script>
</body>
</html>
