<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FRC Display VNC</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #111; overflow: hidden; }
  #status {
    position: fixed;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    background: #0008;
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: sans-serif;
    font-size: 0.85rem;
    z-index: 10;
    transition: opacity 1s;
  }
  #status.hidden { opacity: 0; pointer-events: none; }
  #screen { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="status">Connecting to VNC…</div>
<div id="screen"></div>
<script type="module">
import RFB from '/novnc/core/rfb.js';

const params = new URLSearchParams(location.search);
const pin = params.get('pin') || location.pathname.split('/').pop();
const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
const wsUrl = `${proto}//${location.host}/ws/vnc-client?pin=${pin}`;

const statusEl = document.getElementById('status');

let rfb;
try {
  rfb = new RFB(document.getElementById('screen'), wsUrl, {
    credentials: { password: '' }
  });

  rfb.addEventListener('connect', () => {
    statusEl.textContent = 'Connected';
    setTimeout(() => statusEl.classList.add('hidden'), 2000);
    rfb.scaleViewport = true;
    rfb.resizeSession = false;
  });

  rfb.addEventListener('disconnect', (e) => {
    statusEl.classList.remove('hidden');
    statusEl.textContent = e.detail.clean ? 'Disconnected' : 'Connection lost';
  });

  rfb.addEventListener('credentialsrequired', () => {
    rfb.sendCredentials({ password: '' });
  });

} catch (err) {
  statusEl.textContent = `Error: ${err.message}`;
}
</script>
</body>
</html>
